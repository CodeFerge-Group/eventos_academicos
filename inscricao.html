<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Inscrição - {{ evento.nome }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow border-0" style="border-radius: 15px;">
        <div class="card-header bg-primary text-white p-4" style="border-radius: 15px 15px 0 0;">
            <h2 class="mb-0">Inscrição para: {{ evento.nome }}</h2>
        </div>

        <div class="card-body p-4">
            <form method="POST">

                <div class="mb-3">
                    <label class="form-label fw-bold">Nome Completo:</label>
                    <input type="text" name="nome" class="form-control" placeholder="Digite seu nome" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Data de Nascimento:</label>
                        <input type="date" name="datanasc" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Género:</label>
                        <select name="genero" class="form-control" required>
                            <option value="" disabled selected>Escolha...</option>
                            <option value="M">Masculino</option>
                            <option value="F">Feminino</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">E-mail:</label>
                    <input type="email" name="email" class="form-control" placeholder="exemplo@gmail.com" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Telefone (9 dígitos):</label>
                    <div class="input-group">
                        <span class="input-group-text bg-secondary text-white">+244</span>
                        <input type="text" name="telefone_digitos" class="form-control"
                               placeholder="937401774" maxlength="9" pattern="[0-9]{9}" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Instituição:</label>
                        <input type="text" name="instituicao" class="form-control" placeholder="Ex: Kimpa Vita">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Curso:</label>
                        <input type="text" name="curso" class="form-control" placeholder="Ex: Eng. Informática">
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success px-5">Confirmar Inscrição</button>
                    <a href="/" class="btn btn-secondary px-5">Voltar</a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
